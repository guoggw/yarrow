<body>
<div class="wrap">
  <h1>蓍 草 占 卜</h1>
  <div class="subtitle">— 大 衍 筮 法 · 十 八 变 成 卦 —</div>

  <div class="card">
    <h2><span class="taiji"></span>筮 法 简 介</h2>
    <p class="intro">
      蓍草占卜出自《周易·系辞》：<em>"大衍之数五十，其用四十有九。"</em>
      取蓍草五十根，虚其一以象太极，实用四十九根。分二、挂一、揲四、归奇，
      三变得一爻，十八变而成一卦。每爻数值老阳 <em>九</em>、少阳 <em>七</em>、
      少阴 <em>八</em>、老阴 <em>六</em>；其中<em>老阳老阴</em>为动爻，动则生变卦。
    </p>
  </div>

  <div class="card">
    <h2><span class="taiji"></span>心 诚 问 卦</h2>
    <div class="controls">
      <div style="margin-bottom:16px;">
        <input class="question-input" id="question" placeholder="默念所问之事（可留空）" />
      </div>
      <button id="btnStart">起 卦</button>
      <button id="btnReset">重 来</button>
    </div>
    <div class="process-area" id="process"></div>
  </div>

  <div id="result" style="display:none;">
    <div class="card">
      <h2><span class="taiji"></span>卦 象 呈 现</h2>
      <div class="hex-display" id="hexDisplay"></div>
    </div>

    <div class="card" id="interpretCard">
      <h2><span class="taiji"></span>卦 辞 解 析</h2>
      <div class="interpret" id="interpret"></div>
    </div>
  </div>

  <div class="note">— 卦以诚立 · 心动则应 · 仅供参悟 —</div>
</div>

<script>
/* ========== 八经卦编号：下爻→中→上，二进制（阴0阳1） ========== */
/* 乾7 兑6 离5 震4 巽3 坎2 艮1 坤0 */
const TRIGRAM = { 7:'乾', 6:'兑', 5:'离', 4:'震', 3:'巽', 2:'坎', 1:'艮', 0:'坤' };
const TRI_SYM = { 7:'☰', 6:'☱', 5:'☲', 4:'☳', 3:'☴', 2:'☵', 1:'☶', 0:'☷' };

/* 下卦*8 + 上卦 → 周易卦序编号(1-64) */
const HEX_MAP = {
  [7*8+7]:1,  [0*8+0]:2,  [4*8+2]:3,  [2*8+1]:4,  [7*8+2]:5,  [2*8+7]:6,
  [2*8+0]:7,  [0*8+2]:8,  [7*8+3]:9,  [6*8+7]:10, [7*8+0]:11, [0*8+7]:12,
  [5*8+7]:13, [7*8+5]:14, [1*8+0]:15, [0*8+4]:16, [4*8+6]:17, [3*8+1]:18,
  [6*8+0]:19, [0*8+3]:20, [4*8+5]:21, [5*8+1]:22, [0*8+1]:23, [4*8+0]:24,
  [4*8+7]:25, [7*8+1]:26, [4*8+1]:27, [3*8+6]:28, [2*8+2]:29, [5*8+5]:30,
  [1*8+6]:31, [3*8+4]:32, [1*8+7]:33, [7*8+4]:34, [0*8+5]:35, [5*8+0]:36,
  [5*8+3]:37, [6*8+5]:38, [1*8+2]:39, [2*8+4]:40, [6*8+1]:41, [4*8+3]:42,
  [7*8+6]:43, [3*8+7]:44, [0*8+6]:45, [3*8+0]:46, [2*8+6]:47, [3*8+2]:48,
  [5*8+6]:49, [3*8+5]:50, [4*8+4]:51, [1*8+1]:52, [1*8+3]:53, [6*8+4]:54,
  [5*8+4]:55, [1*8+5]:56, [3*8+3]:57, [6*8+6]:58, [3*8+2]:48, [2*8+3]:59,
  [6*8+2]:60, [6*8+3]:61, [1*8+4]:62, [5*8+2]:63, [2*8+5]:64

/* ========== 六十四卦数据 [卦名, 卦辞, 初爻, 二爻, 三爻, 四爻, 五爻, 上爻] ========== */
const GUA = {
1:['乾为天','元亨利贞。刚健中正，自强不息。','潜龙勿用','见龙在田，利见大人','君子终日乾乾，夕惕若厉，无咎','或跃在渊，无咎','飞龙在天，利见大人','亢龙有悔','用九：见群龙无首，吉'],
2:['坤为地','元亨，利牝马之贞。厚德载物。','履霜，坚冰至','直方大，不习无不利','含章可贞。或从王事，无成有终','括囊，无咎无誉','黄裳，元吉','龙战于野，其血玄黄','用六：利永贞'],
3:['水雷屯','元亨利贞，勿用有攸往，利建侯。','磐桓，利居贞，利建侯','屯如邅如，十年乃字','即鹿无虞，惟入于林中','乘马班如，求婚媾，往吉','屯其膏，小贞吉，大贞凶','乘马班如，泣血涟如'],
4:['山水蒙','亨。匪我求童蒙，童蒙求我。','发蒙，利用刑人','包蒙吉，纳妇吉，子克家','勿用取女，见金夫，不有躬','困蒙，吝','童蒙，吉','击蒙，不利为寇，利御寇'],

/* ========== 爻辞白话解读辅助规则 ========== */
/* 通过关键字自动补充白话，尽量点破意思 */
function yaoPlain(text, position) {
  const posName = ['第一步（初期）', '第二步（进入状态）', '第三步（中途转折）', '第四步（接近成功）', '第五步（鼎盛）', '第六步（终局或过头）'][position];
  let hint = [];
  const rules = [
    ['勿用', '按兵不动、暂不行动'],
    ['利见大人', '有贵人可助，宜求见'],
    ['利涉大川', '可以放手做大事、远行'],
    ['利有攸往', '适宜前往、有所行动'],
    ['利建侯', '适合选立主事之人'],
    ['无咎', '不会有过错，安全'],
    ['元吉', '大吉大利'],
    ['贞吉', '守正道则吉'],
    ['终吉', '最终会吉'],
    ['贞凶', '固执下去有凶险'],
    ['贞厉', '守着有危险'],
    ['征凶', '出征前往会凶'],
    ['凶', '不利、有凶险'],
    ['吉', '顺遂'],
    ['悔亡', '悔恨消散'],
    ['有悔', '会有懊悔'],
    ['吝', '会有困顿、遗憾'],
    ['亨', '通达顺畅'],
    ['有孚', '心怀诚信'],
    ['厉', '有危险须警惕']
  ];
  rules.forEach(([k, v]) => { if (text.includes(k)) hint.push(v); });
  // 去重
  hint = [...new Set(hint)];
  return { position: posName, hints: hint };
}

/* ========== 综合建议：根据动爻数量、卦意生成 ========== */
function makeAdvice(nChange, benId, bianId, changingIdx) {
  const benName = GUA[benId][0];
  if (nChange === 0) {
    return `此为<b>静卦</b>，事态相对稳定，重点看本卦"${benName}"的整体寓意。当前情势不会有剧烈变化，按卦意的方向去应对即可。`;
  }
  if (nChange === 6) {
    if (benId === 1) return `六爻皆变，用九之象：<b>不居首而群龙可驭</b>，宜隐去锋芒、成人之美，反能成事。`;
    if (benId === 2) return `六爻皆变，用六之象：<b>长期守正</b>为要，事态转向变卦"${GUA[bianId][0]}"。`;
    return `六爻皆变，事态将彻底转变，直接看变卦"${GUA[bianId][0]}"的方向：${GUA_TIP[bianId] || ''}`;
  }
  const bianName = bianId ? GUA[bianId][0] : '';
  if (nChange === 1) {
    return `一爻变，以<b>本卦"${benName}"的动爻辞</b>作为核心断语。当前状况按爻辞判断，未来趋势会转向"${bianName}"的格局。`;
  }
  if (nChange === 2) {
    return `两爻变，以<b>较上位的动爻辞</b>为主判断。当前局面复杂，最终会走向"${bianName}"的格局。`;
  }
  if (nChange === 3) {
    return `三爻变，本卦变卦并重，将<b>本卦"${benName}"卦辞</b>与<b>变卦"${bianName}"卦辞</b>合看，两者提示的方向都要考虑。`;
  }
  if (nChange === 4) {
    return `四爻变，以<b>变卦中不变的两爻辞</b>为主判断。当前状态偏离原位，趋向"${bianName}"格局的中间过程。`;
  }
  if (nChange === 5) {
    return `五爻变，以<b>变卦中唯一不变的那爻辞</b>为主判断。事态几乎完全转向"${bianName}"。`;
  }
  return '';
}


/* ========== 一变过程模拟 ========== */
function oneChange(total) {
  // 分二：随机分成两堆
  const left = Math.floor(Math.random() * (total - 2)) + 1;
  let right = total - left;
  // 挂一：从右堆取1根
  let l = left - 0, r = right - 1;
  // 揲四：以四计数余数（1-4）
  const lRem = ((l - 1) % 4) + 1;
  const rRem = ((r - 1) % 4) + 1;
  // 归奇：挂1 + 左余 + 右余
  const used = 1 + lRem + rRem;
  return { used, remain: total - used };
}

/* ========== 一爻（三变） ========== */
function oneYao() {
  let total = 49;
  const changes = [];
  for (let i = 0; i < 3; i++) {
    const c = oneChange(total);
    changes.push(c.used);
    total = c.remain;
  }
  // 剩余数 / 4 → 6/7/8/9
  const num = total / 4;
  return { num, changes, remain: total };
}

async function divine() {
  const procEl = document.getElementById('process');
  const resEl = document.getElementById('result');
  const hexEl = document.getElementById('hexDisplay');
  const interpretEl = document.getElementById('interpret');
  procEl.innerHTML = '';
  resEl.style.display = 'none';
  hexEl.innerHTML = '';
  interpretEl.innerHTML = '';

  const btn = document.getElementById('btnStart');
  btn.disabled = true;

  const q = document.getElementById('question').value.trim();
  if (q) log(`所问：<span class="biao">${escapeHtml(q)}</span>`);
  log('取蓍草五十，去一以象太极，其用四十有九。');
  await sleep(400);

  const yaos = [];  // 从下往上：初、二、三、四、五、上
  const names = ['初爻', '二爻', '三爻', '四爻', '五爻', '上爻'];
  for (let i = 0; i < 6; i++) {
    const y = oneYao();
    yaos.push(y.num);
    const label = { 6:'老阴 ▬▬  ▬▬ 动', 7:'少阳 ▬▬▬▬▬', 8:'少阴 ▬▬  ▬▬', 9:'老阳 ▬▬▬▬▬ 动' }[y.num];
    log(`第 ${i+1} 爻（${names[i]}）三变余数 [${y.changes.join(',')}]，得 <span class="biao">${y.num} · ${label}</span>`);
    await sleep(500);
    renderProgress(yaos);
  }

  await sleep(400);
  const benGua = yaos.map(n => (n === 7 || n === 9) ? 1 : 0);   // 本卦
  const bianGua = yaos.map(n => n === 9 ? 0 : (n === 6 ? 1 : ((n === 7) ? 1 : 0))); // 变卦
  const changingIdx = yaos.map((n, i) => (n === 6 || n === 9) ? i : -1).filter(i => i >= 0);

  const benId = hexIdFromYaos(benGua);
  log(`成卦：本卦 <span class="biao">${GUA[benId][0]}</span>`);

  let bianId = null;
  if (changingIdx.length > 0) {
    bianId = hexIdFromYaos(bianGua);
    log(`动爻：<span class="biao">${changingIdx.map(i => names[i]).join('、')}</span>，变卦 <span class="biao">${GUA[bianId][0]}</span>`);
  } else {
    log('无动爻，静卦。');
  }

  renderHex(yaos, changingIdx, benId, bianId);
  renderInterpret(yaos, changingIdx, benId, bianId);
  document.getElementById('result').style.display = 'block';
  btn.disabled = false;

  function log(txt) {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = txt;
    procEl.appendChild(div);
    procEl.scrollTop = procEl.scrollHeight;
  }
}

function hexIdFromYaos(bits) {
  // bits: 初→上
  const lower = bits[0] + bits[1] * 2 + bits[2] * 4;
  const upper = bits[3] + bits[4] * 2 + bits[5] * 4;
  return HEX_MAP[lower * 8 + upper];
}

function makeHexBox(title, bits, changingIdx, gid) {
  const g = GUA[gid];
  const lower = bits[0] + bits[1] * 2 + bits[2] * 4;
  const upper = bits[3] + bits[4] * 2 + bits[5] * 4;
  const box = document.createElement('div');
  box.className = 'hex-box';
  const yaosHtml = bits.map((b, i) => {
    const cls = (b === 1 ? 'yao yang' : 'yao yin') + (changingIdx.includes(i) ? ' changing' : '');
    return b === 1
      ? `<div class="${cls}"><div class="bar"></div></div>`
      : `<div class="${cls}"><div class="bar"></div><div class="bar"></div></div>`;
  }).join('');
  box.innerHTML = `
    <div class="hex-name">${title}：${g[0]}</div>
    <div class="hex-sub">${TRI_SYM[upper]} ${TRIGRAM[upper]}上 · ${TRIGRAM[lower]}下 ${TRI_SYM[lower]}　（第 ${gid} 卦）</div>
    <div class="hex-visual">${yaosHtml}</div>
  `;
  return box;
}

/* 根据关键字统计吉凶倾向 */
function summarize(benText, focusText, bianText) {
  const score = (t) => {
    let s = 0;
    if (!t) return 0;
    ['元吉', '大吉', '贞吉', '终吉'].forEach(k => t.includes(k) && (s += 3));
    (t.match(/吉/g) || []).forEach(() => s += 2);
    (t.match(/亨/g) || []).forEach(() => s += 1);
    (t.match(/无咎/g) || []).forEach(() => s += 1);
    (t.match(/悔亡/g) || []).forEach(() => s += 1);
    (t.match(/凶/g) || []).forEach(() => s -= 3);
    (t.match(/厉/g) || []).forEach(() => s -= 2);
    (t.match(/吝/g) || []).forEach(() => s -= 2);
    (t.match(/悔/g) || []).forEach(() => s -= 1);
    return s;
  };
  const total = score(benText) + score(focusText) * 2 + score(bianText);
  if (total >= 6) return '<b style="color:#ffd070">大吉 ☀</b>：整体走势顺遂，可积极行动。';
  if (total >= 2) return '<b style="color:#c4d97a">偏吉 ✿</b>：总体有利，但需守正道、勿妄动。';
  if (total >= -1) return '<b style="color:#a89880">平和 ○</b>：不吉不凶，看具体行事细节，宜谨慎稳妥。';
  if (total >= -4) return '<b style="color:#e89060">偏凶 ⚠</b>：阻力较大，宜退守、忍耐、少作变动。';
  return '<b style="color:#ff6b3d">凶险 ✕</b>：形势不利，宜停下审视，切勿冒进。';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

document.getElementById('btnStart').addEventListener('click', divine);
document.getElementById('btnReset').addEventListener('click', () => {
  document.getElementById('process').innerHTML = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('question').value = '';
});
</script>
